<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jenny - DreamBoard AI</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://esm.sh" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              blush: "#FFB7CE",
              barbie: "#FF69B4",
              lilac: "#E6E6FA",
              violet: "#8A2BE2",
              night: "#121212"
            },
            boxShadow: {
              pinkGlow: "0 0 42px rgba(255, 105, 180, 0.38)",
              violetGlow: "0 0 36px rgba(138, 43, 226, 0.34)"
            },
            fontFamily: {
              display: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            }
          }
        }
      };
    </script>
    <script crossorigin src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(255, 105, 180, 0.24), transparent 28rem),
          radial-gradient(circle at 82% 2%, rgba(138, 43, 226, 0.28), transparent 30rem),
          radial-gradient(circle at 50% 95%, rgba(230, 230, 250, 0.12), transparent 24rem),
          #121212;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      .glass {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.05));
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(22px);
      }

      .soft-grid {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(to bottom, black, transparent 88%);
      }

      .sparkle-drift {
        animation: drift 5.5s ease-in-out infinite;
      }

      .pulse-satin {
        animation: satinPulse 2.7s ease-in-out infinite;
      }

      .floaty {
        animation: floaty 4.5s ease-in-out infinite;
      }

      .loading-bar {
        animation: loadingSweep 1.1s ease-in-out infinite;
      }

      @keyframes drift {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.58; }
        50% { transform: translateY(-12px) rotate(8deg); opacity: 1; }
      }

      @keyframes satinPulse {
        0%, 100% { box-shadow: 0 0 0 rgba(255, 105, 180, 0), 0 0 38px rgba(255, 105, 180, 0.28); }
        50% { box-shadow: 0 0 30px rgba(255, 105, 180, 0.34), 0 0 56px rgba(138, 43, 226, 0.26); }
      }

      @keyframes floaty {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }

      @keyframes loadingSweep {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(260%); }
      }

      .pretty-scroll::-webkit-scrollbar {
        width: 10px;
      }

      .pretty-scroll::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
      }

      .pretty-scroll::-webkit-scrollbar-thumb {
        background: linear-gradient(#FF69B4, #8A2BE2);
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useMemo, useState } from "https://esm.sh/react@18.3.1";
      import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
      import {
        Area,
        AreaChart,
        PolarAngleAxis,
        PolarGrid,
        Radar,
        RadarChart,
        ResponsiveContainer,
        Tooltip
      } from "https://esm.sh/recharts@2.12.7";
      import {
        BadgeCheck,
        Brain,
        BriefcaseBusiness,
        Building2,
        CalendarDays,
        CheckCircle2,
        Circle,
        Clock3,
        Dumbbell,
        GraduationCap,
        Heart,
        LayoutGrid,
        LineChart,
        MoonStar,
        Rocket,
        Sparkles,
        Target,
        Wand2
      } from "https://esm.sh/lucide-react@0.468.0";

      const defaultDream =
        "Become a GenAI Engineer at Google by 2028. Publish a Quantum Computing research paper. Build a startup.";

      const iconMap = {
        Career: BriefcaseBusiness,
        Education: GraduationCap,
        Entrepreneurship: Building2,
        Fitness: Dumbbell,
        Research: Brain,
        Creative: Sparkles
      };

      const baseMilestones = [
        {
          title: "Signal Capture",
          window: "Weeks 1-4",
          focus: "Turn every dream into a measurable north-star outcome.",
          tasks: ["Define success metrics", "Choose three skill lanes", "Create public accountability log"],
          progress: 86
        },
        {
          title: "Skill Stack Sprint",
          window: "Months 2-6",
          focus: "Build deep technical proof with a weekly portfolio cadence.",
          tasks: ["Ship one AI module weekly", "Study math foundations", "Publish technical notes"],
          progress: 62
        },
        {
          title: "Proof of Brilliance",
          window: "Months 7-14",
          focus: "Create visible evidence: papers, demos, customer interviews, and case studies.",
          tasks: ["Draft research abstract", "Launch beta landing page", "Interview ten target users"],
          progress: 38
        },
        {
          title: "Elite Opportunity Loop",
          window: "Months 15-24",
          focus: "Convert proof into interviews, collaborators, funding paths, and mentors.",
          tasks: ["Apply to dream teams", "Pitch advisors", "Refine flagship demo"],
          progress: 24
        }
      ];

      const initialDaily = [
        { id: 1, text: "Read 1 Quantum Error Correction paper", complete: false, priority: "Elite" },
        { id: 2, text: "Code a LLM agent module for 45 minutes", complete: true, priority: "High" },
        { id: 3, text: "Write one Google-style STAR story", complete: false, priority: "High" },
        { id: 4, text: "Sketch one startup customer promise", complete: false, priority: "Medium" }
      ];

      function classifySentence(sentence) {
        const clean = sentence.trim();
        const lower = clean.toLowerCase();

        if (lower.includes("startup") || lower.includes("business") || lower.includes("founder")) {
          return {
            category: "Entrepreneurship",
            difficulty: "Elite",
            time: "18-30 months",
            skills: ["Market discovery", "MVP design", "Pitch strategy"],
            dependencies: ["Career portfolio strengthens founder credibility"]
          };
        }

        if (lower.includes("paper") || lower.includes("research") || lower.includes("quantum")) {
          return {
            category: "Research",
            difficulty: "Elite",
            time: "12-20 months",
            skills: ["Advanced Linear Algebra", "Scientific writing", "Experiment design"],
            dependencies: ["Quantum paper relies on Advanced Linear Algebra"]
          };
        }

        if (lower.includes("engineer") || lower.includes("google") || lower.includes("job") || lower.includes("career")) {
          return {
            category: "Career",
            difficulty: "Challenging",
            time: "20-28 months",
            skills: ["Python", "LLM systems", "Distributed ML", "Interview loops"],
            dependencies: ["Portfolio projects unlock recruiter signal"]
          };
        }

        if (lower.includes("fit") || lower.includes("health") || lower.includes("run") || lower.includes("gym")) {
          return {
            category: "Fitness",
            difficulty: "Focused",
            time: "3-9 months",
            skills: ["Habit design", "Recovery planning", "Progressive overload"],
            dependencies: ["Energy plan supports deep work consistency"]
          };
        }

        if (lower.includes("degree") || lower.includes("learn") || lower.includes("study") || lower.includes("course")) {
          return {
            category: "Education",
            difficulty: "Challenging",
            time: "6-18 months",
            skills: ["Curriculum planning", "Deep reading", "Practice schedule"],
            dependencies: ["Study plan feeds career milestones"]
          };
        }

        return {
          category: "Creative",
          difficulty: "Bright Stretch",
          time: "4-12 months",
          skills: ["Personal systems", "Storytelling", "Execution rhythm"],
          dependencies: ["Clear weekly cadence lowers overwhelm"]
        };
      }

      function analyzeDream(text) {
        const sentences = text
          .split(/[.!?]/)
          .map((item) => item.trim())
          .filter(Boolean);

        const source = sentences.length ? sentences : [text.trim() || defaultDream];
        const goals = source.map((sentence, index) => {
          const model = classifySentence(sentence);
          return {
            id: `${model.category}-${index}-${sentence.length}`,
            title: sentence,
            confidence: Math.min(96, 72 + sentence.length + index * 3),
            ...model
          };
        });

        const categoryCount = goals.reduce((acc, goal) => {
          acc[goal.category] = (acc[goal.category] || 0) + 1;
          return acc;
        }, {});

        const radarData = ["Career", "Research", "Entrepreneurship", "Education", "Fitness", "Creative"].map((category) => ({
          category,
          score: Math.min(100, 42 + (categoryCount[category] || 0) * 24 + goals.length * 4)
        }));

        const daily = goals.slice(0, 4).map((goal, index) => ({
          id: Date.now() + index,
          text:
            goal.category === "Research"
              ? "Read 1 technical paper and save three insight bullets"
              : goal.category === "Career"
                ? "Code one portfolio feature tied to your dream role"
                : goal.category === "Entrepreneurship"
                  ? "Ask one customer-style question and log the answer"
                  : `Complete one focused action for: ${goal.title}`,
          complete: false,
          priority: index === 0 ? "Elite" : "High"
        }));

        return { goals, radarData, daily };
      }

      function Badge({ children, tone = "pink" }) {
        const classes =
          tone === "purple"
            ? "border-violet/40 bg-violet/20 text-lilac"
            : tone === "green"
              ? "border-emerald-300/30 bg-emerald-300/10 text-emerald-100"
              : "border-barbie/40 bg-barbie/20 text-pink-100";

        return (
          <span className={`inline-flex items-center rounded-full border px-3 py-1 text-xs font-bold ${classes}`}>
            {children}
          </span>
        );
      }

      function Header() {
        return (
          <header className="relative z-10 mx-auto flex w-full max-w-7xl items-center justify-between px-5 py-5 sm:px-8">
            <div className="flex items-center gap-3">
              <div className="floaty grid h-12 w-12 place-items-center rounded-2xl border border-white/20 bg-white/10 text-2xl shadow-pinkGlow">
                🧸
              </div>
              <div>
                <div className="flex items-center gap-2">
                  <h1 className="text-2xl font-black tracking-normal text-white sm:text-3xl">Jenny ✨</h1>
                  <Badge>DreamBoard AI</Badge>
                </div>
                <p className="text-sm font-medium text-pink-100/70">AI life coach for ambitious soft-power plans</p>
              </div>
            </div>
            <div className="hidden items-center gap-2 rounded-full border border-white/15 bg-white/10 px-4 py-2 text-sm font-semibold text-pink-100 md:flex">
              <MoonStar className="h-4 w-4 text-blush" />
              Neon coquette mode
            </div>
          </header>
        );
      }

      function DreamEngine({ dream, setDream, onAnalyze, loading }) {
        return (
          <section className="relative mx-auto w-full max-w-7xl px-5 pt-4 sm:px-8">
            <div className="soft-grid pointer-events-none absolute inset-x-0 top-0 h-96"></div>
            <div className="relative grid gap-6 lg:grid-cols-[1.08fr_0.92fr]">
              <div className="glass overflow-hidden rounded-[2rem] p-5 sm:p-7">
                <div className="mb-5 flex flex-wrap items-center justify-between gap-3">
                  <div>
                    <p className="text-sm font-bold uppercase tracking-[0.18em] text-barbie">The Dream Engine</p>
                    <h2 className="mt-2 max-w-3xl text-4xl font-black tracking-normal text-white sm:text-5xl lg:text-6xl">
                      Turn giant dreams into a glittering execution map.
                    </h2>
                  </div>
                  <Sparkles className="sparkle-drift h-8 w-8 text-blush" />
                </div>
                <label className="mb-3 block text-sm font-bold text-pink-100" htmlFor="dream-text">
                  Tell Jenny everything you want. Big, wild, impractical, deliciously specific.
                </label>
                <textarea
                  id="dream-text"
                  value={dream}
                  onChange={(event) => setDream(event.target.value)}
                  className="min-h-44 w-full resize-y rounded-[1.5rem] border border-white/15 bg-black/30 px-5 py-4 text-base font-medium leading-7 text-white outline-none transition duration-300 placeholder:text-pink-100/40 focus:border-barbie focus:bg-black/40 focus:shadow-pinkGlow"
                  placeholder="Become a founder, research scientist, marathon runner..."
                />
                <div className="mt-5 flex flex-col gap-3 sm:flex-row sm:items-center">
                  <button
                    onClick={onAnalyze}
                    disabled={loading}
                    className="pulse-satin inline-flex min-h-12 items-center justify-center gap-3 rounded-full bg-gradient-to-r from-barbie via-blush to-violet px-6 py-3 text-sm font-black text-white shadow-pinkGlow transition duration-300 hover:scale-[1.02] hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-70"
                  >
                    <Wand2 className="h-5 w-5" />
                    {loading ? "Jenny is spinning her magic... ✨" : "Analyze My Dreams 💖"}
                  </button>
                  <p className="text-sm font-medium text-pink-100/60">
                    Mock AI parsing, live dashboards, roadmap reloads, and persistent checklist state.
                  </p>
                </div>
                {loading && (
                  <div className="mt-5 h-2 overflow-hidden rounded-full bg-white/10">
                    <div className="loading-bar h-full w-1/2 rounded-full bg-gradient-to-r from-transparent via-barbie to-transparent"></div>
                  </div>
                )}
              </div>

              <aside className="glass rounded-[2rem] p-5 sm:p-7">
                <div className="mb-5 flex items-center justify-between">
                  <div>
                    <p className="text-sm font-bold uppercase tracking-[0.18em] text-lilac">Jenny says</p>
                    <h3 className="mt-2 text-2xl font-black text-white">Your dream has main-character energy.</h3>
                  </div>
                  <Heart className="h-7 w-7 fill-barbie text-barbie" />
                </div>
                <div className="grid gap-3">
                  {[
                    ["Ambition density", "94%", "from multi-domain goals"],
                    ["Risk clarity", "High", "needs dependency mapping"],
                    ["Execution style", "Sprint", "weekly portfolio proof"],
                    ["Coach tone", "Sweet but serious", "soft voice, sharp plan"]
                  ].map(([label, value, note]) => (
                    <div key={label} className="rounded-3xl border border-white/10 bg-white/10 p-4">
                      <div className="flex items-center justify-between gap-3">
                        <span className="text-sm font-bold text-pink-100/70">{label}</span>
                        <span className="text-lg font-black text-white">{value}</span>
                      </div>
                      <p className="mt-1 text-xs font-semibold text-pink-100/50">{note}</p>
                    </div>
                  ))}
                </div>
              </aside>
            </div>
          </section>
        );
      }

      function GoalMatrix({ goals }) {
        return (
          <section className="mx-auto w-full max-w-7xl px-5 py-8 sm:px-8">
            <div className="mb-5 flex flex-wrap items-end justify-between gap-4">
              <div>
                <p className="text-sm font-bold uppercase tracking-[0.18em] text-barbie">The Matrix</p>
                <h2 className="mt-2 text-3xl font-black text-white">AI goal analysis dashboard</h2>
              </div>
              <Badge tone="purple">{goals.length} dream vectors mapped</Badge>
            </div>
            <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
              {goals.map((goal) => {
                const Icon = iconMap[goal.category] || Sparkles;
                return (
                  <article key={goal.id} className="glass group rounded-[1.75rem] p-5 transition duration-300 hover:-translate-y-1 hover:border-barbie/50 hover:shadow-pinkGlow">
                    <div className="mb-4 flex items-start justify-between gap-4">
                      <div className="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-barbie/80 to-violet/80 shadow-violetGlow">
                        <Icon className="h-6 w-6 text-white" />
                      </div>
                      <Badge tone={goal.difficulty === "Elite" ? "purple" : "pink"}>{goal.difficulty}</Badge>
                    </div>
                    <h3 className="min-h-16 text-xl font-black leading-snug text-white">{goal.title}</h3>
                    <div className="mt-4 grid gap-3">
                      <div className="flex items-center gap-2 text-sm font-semibold text-pink-100/70">
                        <Target className="h-4 w-4 text-barbie" />
                        {goal.category}
                      </div>
                      <div className="flex items-center gap-2 text-sm font-semibold text-pink-100/70">
                        <Clock3 className="h-4 w-4 text-lilac" />
                        Estimated time matrix: {goal.time}
                      </div>
                      <div className="rounded-2xl border border-white/10 bg-black/25 p-3">
                        <p className="mb-2 text-xs font-black uppercase tracking-[0.14em] text-blush">Skills Required</p>
                        <div className="flex flex-wrap gap-2">
                          {goal.skills.map((skill) => (
                            <span key={skill} className="rounded-full bg-white/10 px-3 py-1 text-xs font-bold text-white/80">
                              {skill}
                            </span>
                          ))}
                        </div>
                      </div>
                      <div className="rounded-2xl border border-violet/25 bg-violet/10 p-3 text-sm font-semibold text-lilac">
                        {goal.dependencies[0]}
                      </div>
                    </div>
                  </article>
                );
              })}
            </div>
          </section>
        );
      }

      function Roadmap({ aesthetic, setAesthetic, checkedTasks, toggleMilestoneTask }) {
        return (
          <section className="mx-auto w-full max-w-7xl px-5 py-4 sm:px-8">
            <div className="mb-5 flex flex-wrap items-center justify-between gap-4">
              <div>
                <p className="text-sm font-bold uppercase tracking-[0.18em] text-barbie">The Vision Board</p>
                <h2 className="mt-2 text-3xl font-black text-white">Interactive visual roadmap</h2>
              </div>
              <button
                onClick={() => setAesthetic((value) => !value)}
                className="inline-flex min-h-11 items-center justify-center gap-2 rounded-full border border-white/15 bg-white/10 px-5 py-2 text-sm font-black text-white transition duration-300 hover:border-barbie/60 hover:bg-barbie/20"
              >
                {aesthetic ? <LineChart className="h-4 w-4 text-blush" /> : <LayoutGrid className="h-4 w-4 text-blush" />}
                {aesthetic ? "Professional Matrix" : "Aesthetic Mode"}
              </button>
            </div>

            <div className={aesthetic ? "grid gap-4 md:grid-cols-2 xl:grid-cols-4" : "relative grid gap-5 border-l border-barbie/35 pl-5 md:pl-8"}>
              {baseMilestones.map((milestone, index) => (
                <article
                  key={milestone.title}
                  className={`glass relative rounded-[1.75rem] p-5 transition duration-300 hover:-translate-y-1 ${
                    aesthetic ? "overflow-hidden" : "ml-2"
                  }`}
                >
                  {!aesthetic && <div className="absolute -left-[2.35rem] top-7 h-5 w-5 rounded-full border-4 border-night bg-barbie shadow-pinkGlow"></div>}
                  {aesthetic && <div className="absolute right-4 top-4 text-2xl opacity-70">{["💖", "✨", "🎀", "🌙"][index]}</div>}
                  <div className="mb-4 flex items-center justify-between gap-3">
                    <Badge tone={index > 1 ? "purple" : "pink"}>Phase {index + 1}</Badge>
                    <span className="inline-flex items-center gap-1 text-xs font-bold text-pink-100/60">
                      <CalendarDays className="h-3.5 w-3.5" />
                      {milestone.window}
                    </span>
                  </div>
                  <h3 className="text-xl font-black text-white">{milestone.title}</h3>
                  <p className="mt-2 min-h-14 text-sm font-medium leading-6 text-pink-100/70">{milestone.focus}</p>
                  <div className="mt-4">
                    <div className="mb-2 flex items-center justify-between text-xs font-black uppercase tracking-[0.14em] text-pink-100/50">
                      <span>Progress</span>
                      <span>{milestone.progress}%</span>
                    </div>
                    <div className="h-3 overflow-hidden rounded-full bg-white/10">
                      <div
                        className="h-full rounded-full bg-gradient-to-r from-barbie to-violet transition-all duration-700"
                        style={{ width: `${milestone.progress}%` }}
                      ></div>
                    </div>
                  </div>
                  <div className="mt-4 grid gap-2">
                    {milestone.tasks.map((task, taskIndex) => {
                      const id = `${index}-${taskIndex}`;
                      const checked = checkedTasks[id];
                      return (
                        <label key={task} className="flex cursor-pointer items-center gap-3 rounded-2xl border border-white/10 bg-black/20 px-3 py-2 transition duration-300 hover:border-barbie/35">
                          <input
                            checked={!!checked}
                            onChange={() => toggleMilestoneTask(id)}
                            className="sr-only"
                            type="checkbox"
                          />
                          {checked ? <CheckCircle2 className="h-5 w-5 flex-none fill-barbie text-white" /> : <Circle className="h-5 w-5 flex-none text-pink-100/40" />}
                          <span className={`text-sm font-semibold ${checked ? "text-pink-100/40 line-through" : "text-pink-100/75"}`}>{task}</span>
                        </label>
                      );
                    })}
                  </div>
                </article>
              ))}
            </div>
          </section>
        );
      }

      function Analytics({ radarData, daily, setDaily, success }) {
        const trend = [
          { label: "Mon", value: 34 },
          { label: "Tue", value: 43 },
          { label: "Wed", value: 54 },
          { label: "Thu", value: 61 },
          { label: "Fri", value: success }
        ];

        function toggleDaily(id) {
          setDaily((items) => items.map((item) => (item.id === id ? { ...item, complete: !item.complete } : item)));
        }

        return (
          <section className="mx-auto grid w-full max-w-7xl gap-5 px-5 py-8 sm:px-8 lg:grid-cols-[0.95fr_1.05fr]">
            <div className="glass rounded-[2rem] p-5 sm:p-7">
              <div className="mb-5 flex items-center justify-between gap-3">
                <div>
                  <p className="text-sm font-bold uppercase tracking-[0.18em] text-barbie">Predictive Analytics</p>
                  <h2 className="mt-2 text-3xl font-black text-white">Likelihood of success</h2>
                </div>
                <div className="grid h-20 w-20 place-items-center rounded-full border border-barbie/40 bg-barbie/15 text-2xl font-black text-white shadow-pinkGlow">
                  {success}%
                </div>
              </div>
              <div className="h-72">
                <ResponsiveContainer width="100%" height="100%">
                  <RadarChart data={radarData}>
                    <PolarGrid stroke="rgba(255,255,255,0.16)" />
                    <PolarAngleAxis dataKey="category" tick={{ fill: "#FCE7F3", fontSize: 12, fontWeight: 700 }} />
                    <Radar name="Dream Force" dataKey="score" stroke="#FF69B4" fill="#FF69B4" fillOpacity={0.42} />
                    <Tooltip
                      contentStyle={{
                        background: "rgba(18, 18, 18, 0.92)",
                        border: "1px solid rgba(255, 105, 180, 0.4)",
                        borderRadius: 18,
                        color: "#fff"
                      }}
                    />
                  </RadarChart>
                </ResponsiveContainer>
              </div>
              <div className="mt-3 h-32">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={trend}>
                    <defs>
                      <linearGradient id="pinkTrend" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="5%" stopColor="#FF69B4" stopOpacity={0.7} />
                        <stop offset="95%" stopColor="#8A2BE2" stopOpacity={0.06} />
                      </linearGradient>
                    </defs>
                    <Area type="monotone" dataKey="value" stroke="#E6E6FA" strokeWidth={3} fill="url(#pinkTrend)" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="glass rounded-[2rem] p-5 sm:p-7">
              <div className="mb-5 flex items-center justify-between gap-4">
                <div>
                  <p className="text-sm font-bold uppercase tracking-[0.18em] text-barbie">Daily Sparkle Actions</p>
                  <h2 className="mt-2 text-3xl font-black text-white">Next steps daily</h2>
                </div>
                <Badge tone="green">{daily.filter((item) => item.complete).length}/{daily.length} done</Badge>
              </div>
              <div className="grid gap-3">
                {daily.map((item) => (
                  <label
                    key={item.id}
                    className="group flex cursor-pointer items-center gap-4 rounded-[1.35rem] border border-white/10 bg-black/25 p-4 transition duration-300 hover:border-barbie/50 hover:bg-barbie/10"
                  >
                    <input checked={item.complete} onChange={() => toggleDaily(item.id)} className="sr-only" type="checkbox" />
                    {item.complete ? <CheckCircle2 className="h-6 w-6 flex-none fill-barbie text-white" /> : <Circle className="h-6 w-6 flex-none text-pink-100/40" />}
                    <div className="min-w-0 flex-1">
                      <p className={`font-bold leading-6 ${item.complete ? "text-pink-100/40 line-through" : "text-white"}`}>{item.text}</p>
                      <p className="mt-1 text-xs font-black uppercase tracking-[0.15em] text-pink-100/50">{item.priority} priority</p>
                    </div>
                    <Badge tone={item.priority === "Elite" ? "purple" : "pink"}>{item.complete ? "Sparkled" : "Do now"}</Badge>
                  </label>
                ))}
              </div>
              <div className="mt-5 rounded-[1.5rem] border border-barbie/25 bg-gradient-to-r from-barbie/20 to-violet/20 p-4">
                <div className="flex items-center gap-3">
                  <BadgeCheck className="h-5 w-5 text-blush" />
                  <p className="text-sm font-bold leading-6 text-pink-100/80">
                    Jenny recalculates success from completed actions, milestone checkboxes, and goal complexity. Tiny steps, very dramatic compounding.
                  </p>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [dream, setDream] = useState(defaultDream);
        const [analysis, setAnalysis] = useState(() => analyzeDream(defaultDream));
        const [daily, setDaily] = useState(initialDaily);
        const [checkedTasks, setCheckedTasks] = useState({ "0-0": true, "0-1": true, "1-0": true });
        const [aesthetic, setAesthetic] = useState(false);
        const [loading, setLoading] = useState(false);

        const completionScore = useMemo(() => {
          const dailyDone = daily.filter((item) => item.complete).length;
          const roadmapDone = Object.values(checkedTasks).filter(Boolean).length;
          return Math.min(96, 44 + dailyDone * 8 + roadmapDone * 4 + analysis.goals.length * 3);
        }, [daily, checkedTasks, analysis.goals.length]);

        function handleAnalyze() {
          setLoading(true);
          window.setTimeout(() => {
            const next = analyzeDream(dream);
            setAnalysis(next);
            setDaily(next.daily.length ? next.daily : initialDaily);
            setCheckedTasks({ "0-0": true });
            setLoading(false);
          }, 950);
        }

        function toggleMilestoneTask(id) {
          setCheckedTasks((items) => ({ ...items, [id]: !items[id] }));
        }

        return (
          <main className="pretty-scroll min-h-screen overflow-x-hidden pb-12 text-white">
            <Header />
            <DreamEngine dream={dream} setDream={setDream} onAnalyze={handleAnalyze} loading={loading} />
            <GoalMatrix goals={analysis.goals} />
            <Roadmap
              aesthetic={aesthetic}
              setAesthetic={setAesthetic}
              checkedTasks={checkedTasks}
              toggleMilestoneTask={toggleMilestoneTask}
            />
            <Analytics radarData={analysis.radarData} daily={daily} setDaily={setDaily} success={completionScore} />
          </main>
        );
      }

      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
